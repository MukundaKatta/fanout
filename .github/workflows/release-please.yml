name: Release please

# Maintains a "release PR" that aggregates conventional commits since the last
# tag. Merging the release PR cuts a version bump, updates CHANGELOG.md, and
# publishes a GitHub release. No publish step yet — Fanout isn't on npm/PyPI.

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
